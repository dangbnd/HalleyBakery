    content="Đặt bánh sinh nhật, bánh sự kiện theo yêu cầu. Giao hàng tận nơi tại Hà Nội.">

  <link rel="dns-prefetch" href="//drive.google.com">
  <link rel="preconnect" href="https://images.weserv.nl">
  <link rel="dns-prefetch" href="https://images.weserv.nl">

  <title>HALLEY BAKERY — Bánh sinh nhật & Bánh sự kiện Hà Nội</title>
</head>

<body>

  <div id="root">
    <style>
      .hb-boot {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        font: 500 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .hb-boot-card {
        background: rgba(255, 255, 255, .84);
        border: 1px solid rgba(255, 255, 255, .85);
        border-radius: 24px;
        padding: 24px 30px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, .06);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .hb-logo-wrap {
        position: relative;
      }

      .hb-glow {
        position: absolute;
        inset: -8px;
        background: #ffe4ea;
        border-radius: 999px;
        filter: blur(12px);
        opacity: .45;
        animation: hbPulse 2.6s ease-in-out infinite;
      }

      .hb-logo {
        position: relative;
        width: 56px;
        height: 56px;
        object-fit: contain;
        animation: hbFloat 4s ease-in-out infinite;
      }

      .hb-bar {
        width: 68px;
        height: 2px;
        background: #f1f5f9;
        border-radius: 999px;
        overflow: hidden;
      }

      .hb-bar>span {
        display: block;
        width: 100%;
        height: 100%;
        background: #fb7185;
        transform-origin: left;
        animation: hbProgress 1.5s linear infinite;
      }

      .hb-msg {
        color: #9ca3af;
        font-size: 12px;
      }

      @keyframes hbPulse {
        0%,
        100% {
          transform: scale(.92);
          opacity: .35;
        }

        50% {
          transform: scale(1.08);
          opacity: .6;
        }
      }

      @keyframes hbFloat {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-3px);
        }
      }

      @keyframes hbProgress {
        0% {
          transform: translateX(-100%) scaleX(.2);
        }

        50% {
          transform: translateX(0) scaleX(.5);
        }

        100% {
          transform: translateX(100%) scaleX(.2);
        }
      }

      .hb-err {
        position: fixed;
        inset: 0;
        background: #fff;
        padding: 24px;
        font: 14px/1.4 ui-monospace, monospace;
        overflow: auto
      }
    </style>
    <div class="hb-boot">
      <div class="hb-boot-card">
        <div class="hb-logo-wrap">
          <span class="hb-glow"></span>
          <img class="hb-logo" src="/brand/logo-mobile.png" alt="Halley Bakery">
        </div>
        <div class="hb-bar"><span></span></div>
        <div class="hb-msg">Bạn chờ chút chút nhé...</div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      function show(e) {
        var el = document.createElement('div'); el.className = 'hb-err';
        el.innerHTML = '<b>Lỗi khởi động.</b><br><pre>' + String(e && (e.message || e)).slice(0, 2000) + '</pre>';
        document.body.appendChild(el);
      }
      window.addEventListener('error', function (e) { show(e.error || e.message); });
      window.addEventListener('unhandledrejection', function (e) { show(e.reason || e); });
    })();
  </script>

  <script type="module">
    if (
      location.hostname === "localhost" ||
      location.hostname === "127.0.0.1" ||
      location.hostname === "0.0.0.0"
    ) {
      const refreshPath = "/" + "@react-refresh";
      import(refreshPath)
        .then(({ default: RefreshRuntime }) => {
          if (window.__vite_plugin_react_preamble_installed__) return;
          RefreshRuntime.injectIntoGlobalHook(window);
          window.$RefreshReg$ = () => {};
          window.$RefreshSig$ = () => (type) => type;
          window.__vite_plugin_react_preamble_installed__ = true;
        })
        .catch(() => {});
    }
  </script>

  <script type="module" src="/src/main.jsx"></script>

  <!-- Register Service Worker for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(() => {});
      });
    }
  </script>
</body>

</html>
